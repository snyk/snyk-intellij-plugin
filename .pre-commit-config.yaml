# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/gitguardian/ggshield
    rev: v1.43.0
    hooks:
      - id: ggshield
        language_version: python3
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: format-and-lint
        name: format and lint
        entry: ./gradlew spotlessApply ktlintCheck
        language: system
        stages: [pre-commit]
        pass_filenames: false
      - id: verifyPlugin
        name: verifyPlugin
        entry: ./gradlew verifyPlugin
        language: system
        stages: [pre-push]
        pass_filenames: false
      - id: test
        name: test
        # Delegates to scripts/pre-push-test.sh, which detects the Docker Desktop
        # LinuxKit dev-container (/.dockerenv or REMOTE_CONTAINERS/DEVCONTAINER env
        # var) and automatically appends -PkoverUseJacoco only there (switches Kover to
        # its JaCoCo backend, which coexists with MockK's ByteBuddy agent; the native
        # Kover agent conflicts). Outside the container the flag is NOT set, so native
        # Linux/macOS developers retain their native Kover coverage data. Also resolves
        # the JAVA_HOME dangling symlink present in the dev-container. See ADR-1,
        # docs/plans/container-mockk-bytebuddy-agent.md and
        # docs/plans/container-local-coverage-jacoco.md.
        entry: bash scripts/pre-push-test.sh
        language: system
        stages: [pre-push]
        pass_filenames: false

