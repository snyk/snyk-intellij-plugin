name: Static Resource Checking
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  static-resource-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Check Static Resources
        # The resource map lives in scripts/update-shared-resources.sh (the single
        # source of truth). Run that script with --check to update the resources locally.
        run: scripts/update-shared-resources.sh --check
